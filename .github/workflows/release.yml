name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup environment
        run: |
          sudo apt-get update
          sudo apt-get install -y fpm python3-all tar
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build .deb package
        run: |
          mkdir -p pkg/usr/lib/krabbystrap
          mkdir -p pkg/usr/bin
          mkdir -p pkg/usr/share/applications
          mkdir -p pkg/usr/share/pixmaps

          cp -r src templates assets requirements.txt pkg/usr/lib/krabbystrap/

          cat > pkg/usr/bin/krabbystrap << 'EOF'
#!/bin/bash
VENV_DIR="$HOME/.local/share/krabbystrap/venv"
if [ ! -d "$VENV_DIR" ]; then
    python3 -m venv "$VENV_DIR" 2>/dev/null || exit 1
    "$VENV_DIR/bin/pip" install -q -r /usr/lib/krabbystrap/requirements.txt 2>/dev/null || exit 1
fi
exec "$VENV_DIR/bin/python3" /usr/lib/krabbystrap/src/launch.py "$@"
EOF
          chmod +x pkg/usr/bin/krabbystrap

          cp assets/krabby.png pkg/usr/share/pixmaps/krabbystrap.png

          cat > pkg/usr/share/applications/krabbystrap.desktop << 'EOF'
[Desktop Entry]
Name=Krabbystrap
Comment=Roblox launcher for Linux via Sober
Exec=krabbystrap
Icon=krabbystrap
Type=Application
Categories=Game;
Terminal=false
StartupWMClass=Krabbystrap
Actions=Settings;

[Desktop Action Settings]
Name=Open Settings
Exec=krabbystrap --settings
EOF

          fpm -s dir -t deb \
            -n krabbystrap \
            -v "$VERSION" \
            --description "Roblox launcher for Linux via Sober" \
            --url "https://github.com/krabbyorg/krabbystrap" \
            --license "GPL-3.0" \
            --depends "python3 (>= 3.11)" \
            --depends "python3-venv" \
            --depends "flatpak" \
            -C pkg .

      - name: Build Arch package
        run: |
          mkdir -p archpkg/krabbystrap-$VERSION
          cp -r src templates assets requirements.txt archpkg/krabbystrap-$VERSION/

          VERSION_VAR="$VERSION"
          cat > archpkg/PKGBUILD << 'EOF'
pkgname=krabbystrap
pkgver=PLACEHOLDER_VERSION
pkgrel=1
pkgdesc="Roblox launcher for Linux via Sober"
arch=('any')
url="https://github.com/krabbyorg/krabbystrap"
license=('GPL-3.0-only')
depends=('python>=3.11' 'python-pyside6' 'python-flask' 'python-requests' 'flatpak')
source=(".")
md5sums=("SKIP")

package() {
    install -dm755 "$pkgdir/usr/lib/$pkgname"
    cp -r src templates assets requirements.txt "$pkgdir/usr/lib/$pkgname/"

    install -Dm755 /dev/stdin "$pkgdir/usr/bin/$pkgname" << 'EXEC'
#!/bin/bash
exec python3 /usr/lib/krabbystrap/src/launch.py "$@"
EXEC

    install -Dm644 assets/krabby.png "$pkgdir/usr/share/pixmaps/krabbystrap.png"
    install -Dm644 /dev/stdin "$pkgdir/usr/share/applications/krabbystrap.desktop" << 'DESK'
[Desktop Entry]
Name=Krabbystrap
Comment=Roblox launcher for Linux via Sober
Exec=krabbystrap
Icon=krabbystrap
Type=Application
Categories=Game;
Terminal=false
Actions=Settings;

[Desktop Action Settings]
Name=Open Settings
Exec=krabbystrap --settings
DESK
}
EOF
          sed -i "s/PLACEHOLDER_VERSION/$VERSION_VAR/" archpkg/PKGBUILD
          cd archpkg
          tar czf ../krabbystrap-$VERSION.tar.gz PKGBUILD krabbystrap-$VERSION/

      - name: Sign packages with GPG
        env:
          GPG_KEY: ${{ secrets.KRABBYSTRAP_GPG_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_KEY" | gpg --import --batch --no-tty 2>/dev/null || true

          # Sign .deb
          gpg --detach-sign --armor --batch --no-tty \
            krabbystrap_$VERSION_all.deb 2>/dev/null || echo "Warning: GPG signing failed, continuing unsigned"

          # Sign .tar.gz
          gpg --detach-sign --armor --batch --no-tty \
            krabbystrap-$VERSION.tar.gz 2>/dev/null || echo "Warning: GPG signing failed, continuing unsigned"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: |
            krabbystrap_*.deb*
            krabbystrap-*.tar.gz*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: packages
          path: ./packages

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: packages/**
          body: |
            ## Installation

            ### Debian / Ubuntu
            ```bash
            curl -fsSL https://raw.githubusercontent.com/krabbyorg/krabbystrap/main/packaging/setup-repo.sh | bash
            sudo apt install krabbystrap
            ```

            ### Arch Linux
            ```bash
            curl -fsSL https://raw.githubusercontent.com/krabbyorg/krabbystrap/main/packaging/setup-repo.sh | bash
            sudo pacman -S krabbystrap
            ```

            ### Manual Install
            Download the appropriate package above and install:
            - **Debian/Ubuntu**: `sudo apt install ./krabbystrap_*.deb`
            - **Arch Linux**: `sudo pacman -U ./krabbystrap-*.tar.gz`
