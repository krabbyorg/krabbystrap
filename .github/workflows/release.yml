name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-deb:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup environment
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev build-essential python3-all tar
          sudo gem install fpm
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build .deb package
        run: |
          mkdir -p pkg/usr/lib/krabbystrap
          mkdir -p pkg/usr/bin
          mkdir -p pkg/usr/share/applications
          mkdir -p pkg/usr/share/pixmaps

          cp -r src templates assets requirements.txt pkg/usr/lib/krabbystrap/
          cp packaging/krabbystrap-launcher.sh pkg/usr/bin/krabbystrap
          chmod +x pkg/usr/bin/krabbystrap
          cp assets/krabby.png pkg/usr/share/pixmaps/krabbystrap.png

          printf '[Desktop Entry]\nName=Krabbystrap\nComment=Roblox launcher for Linux via Sober\nExec=krabbystrap\nIcon=krabbystrap\nType=Application\nCategories=Game;\nTerminal=false\nStartupWMClass=Krabbystrap\nActions=Settings;\n\n[Desktop Action Settings]\nName=Open Settings\nExec=krabbystrap --settings\n' \
            > pkg/usr/share/applications/krabbystrap.desktop

          fpm -s dir -t deb \
            -n krabbystrap \
            -v "$VERSION" \
            --description "Roblox launcher for Linux via Sober" \
            --url "https://github.com/krabbyorg/krabbystrap" \
            --license "GPL-3.0" \
            --depends "python3 (>= 3.11)" \
            --depends "python3-venv" \
            --depends "flatpak" \
            -C pkg .

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb
          path: krabbystrap_*.deb

  build-arch:
    runs-on: ubuntu-22.04
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup build environment
        run: |
          pacman -Syu --noconfirm base-devel python git
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          useradd -m builder
          chown -R builder:builder .

      - name: Build Arch package and repo
        run: |
          WS="$GITHUB_WORKSPACE"
          mkdir -p /tmp/build
          cp -r "$WS"/src "$WS"/templates "$WS"/assets "$WS"/requirements.txt "$WS"/packaging /tmp/build/

          printf 'pkgname=krabbystrap\npkgver=%s\npkgrel=1\npkgdesc="Roblox launcher for Linux via Sober"\narch=("any")\nurl="https://github.com/krabbyorg/krabbystrap"\nlicense=("GPL-3.0-only")\ndepends=("python>=3.11" "python-pip" "flatpak")\nsource=()\nsha256sums=()\n\npackage() {\n  install -dm755 "$pkgdir/usr/lib/krabbystrap"\n  cp -r %s/src %s/templates %s/assets %s/requirements.txt "$pkgdir/usr/lib/krabbystrap/"\n  install -Dm755 %s/packaging/krabbystrap-launcher.sh "$pkgdir/usr/bin/krabbystrap"\n  install -Dm644 %s/assets/krabby.png "$pkgdir/usr/share/pixmaps/krabbystrap.png"\n  install -dm755 "$pkgdir/usr/share/applications"\\n  printf "[Desktop Entry]\\nName=Krabbystrap\\nComment=Roblox launcher for Linux via Sober\\nExec=krabbystrap\\nIcon=krabbystrap\\nType=Application\\nCategories=Game;\\nTerminal=false\\nStartupWMClass=Krabbystrap\\nActions=Settings;\\n\\n[Desktop Action Settings]\\nName=Open Settings\\nExec=krabbystrap --settings\\n" > "$pkgdir/usr/share/applications/krabbystrap.desktop"\n}\n' \
            "$VERSION" "$WS" "$WS" "$WS" "$WS" "$WS" "$WS" > /tmp/build/PKGBUILD

          chown -R builder:builder /tmp/build
          su builder -c "cd /tmp/build && makepkg --nodeps --noconfirm"

          cp /tmp/build/krabbystrap-*.pkg.tar.zst "$WS"/
          cd "$WS"
          repo-add krabbystrap.db.tar.gz krabbystrap-*.pkg.tar.zst

      - name: Upload arch artifact
        uses: actions/upload-artifact@v4
        with:
          name: arch
          path: |
            krabbystrap-*.pkg.tar.zst
            krabbystrap.db
            krabbystrap.db.tar.gz
            krabbystrap.db.tar.gz.sig
            krabbystrap.files
            krabbystrap.files.tar.gz

  release:
    needs: [build-deb, build-arch]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Update repo release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: repo
          name: Package Repository
          prerelease: true
          files: artifacts/arch/*

      - name: Create version release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/deb/*
            artifacts/arch/krabbystrap-*.pkg.tar.zst
          body: |
            ## Installation

            ### Arch Linux
            ```bash
            curl -fsSL https://raw.githubusercontent.com/krabbyorg/krabbystrap/main/packaging/setup-repo.sh | bash
            sudo pacman -S krabbystrap
            ```

            ### Debian / Ubuntu
            ```bash
            curl -fsSL https://raw.githubusercontent.com/krabbyorg/krabbystrap/main/packaging/setup-repo.sh | bash
            sudo apt install krabbystrap
            ```

            ### Manual Install
            - **Debian/Ubuntu**: `sudo apt install ./krabbystrap_*.deb`
            - **Arch Linux**: `sudo pacman -U ./krabbystrap-*.pkg.tar.zst`
