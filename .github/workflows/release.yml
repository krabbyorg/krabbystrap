name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup environment
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev build-essential python3-all tar
          sudo gem install fpm
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build .deb package
        run: |
          mkdir -p pkg/usr/lib/krabbystrap
          mkdir -p pkg/usr/bin
          mkdir -p pkg/usr/share/applications
          mkdir -p pkg/usr/share/pixmaps

          cp -r src templates assets requirements.txt pkg/usr/lib/krabbystrap/
          cp packaging/krabbystrap-launcher.sh pkg/usr/bin/krabbystrap
          chmod +x pkg/usr/bin/krabbystrap

          cp assets/krabby.png pkg/usr/share/pixmaps/krabbystrap.png

          printf '[Desktop Entry]\nName=Krabbystrap\nComment=Roblox launcher for Linux via Sober\nExec=krabbystrap\nIcon=krabbystrap\nType=Application\nCategories=Game;\nTerminal=false\nStartupWMClass=Krabbystrap\nActions=Settings;\n\n[Desktop Action Settings]\nName=Open Settings\nExec=krabbystrap --settings\n' \
            > pkg/usr/share/applications/krabbystrap.desktop

          fpm -s dir -t deb \
            -n krabbystrap \
            -v "$VERSION" \
            --description "Roblox launcher for Linux via Sober" \
            --url "https://github.com/krabbyorg/krabbystrap" \
            --license "GPL-3.0" \
            --depends "python3 (>= 3.11)" \
            --depends "python3-venv" \
            --depends "flatpak" \
            -C pkg .

      - name: Build Arch package
        run: |
          mkdir -p archpkg/krabbystrap-$VERSION
          cp -r src templates assets requirements.txt archpkg/krabbystrap-$VERSION/
          cp packaging/krabbystrap-launcher.sh archpkg/krabbystrap-$VERSION/krabbystrap

          printf 'pkgname=krabbystrap\npkgver=%s\npkgrel=1\npkgdesc="Roblox launcher for Linux via Sober"\narch=("any")\nurl="https://github.com/krabbyorg/krabbystrap"\nlicense=("GPL-3.0-only")\ndepends=("python>=3.11" "python-pyside6" "python-flask" "python-requests" "flatpak")\nsource=(".")\nmd5sums=("SKIP")\n\npackage() {\n    install -dm755 "$pkgdir/usr/lib/$pkgname"\n    cp -r src templates assets requirements.txt "$pkgdir/usr/lib/$pkgname/"\n    install -Dm755 krabbystrap "$pkgdir/usr/bin/$pkgname"\n    install -Dm644 assets/krabby.png "$pkgdir/usr/share/pixmaps/krabbystrap.png"\n    printf "[Desktop Entry]\\nName=Krabbystrap\\nExec=krabbystrap\\nIcon=krabbystrap\\nType=Application\\nCategories=Game;\\nTerminal=false\\n" > "$pkgdir/usr/share/applications/krabbystrap.desktop"\n}\n' \
            "$VERSION" > archpkg/PKGBUILD

          cd archpkg
          tar czf ../krabbystrap-$VERSION.tar.gz PKGBUILD krabbystrap-$VERSION/

      - name: Sign packages with GPG
        env:
          GPG_KEY: ${{ secrets.KRABBYSTRAP_GPG_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_KEY" | gpg --import --batch --no-tty 2>/dev/null || true

          gpg --detach-sign --armor --batch --no-tty \
            krabbystrap_${VERSION}_all.deb 2>/dev/null || echo "Warning: GPG signing failed, continuing unsigned"

          gpg --detach-sign --armor --batch --no-tty \
            krabbystrap-$VERSION.tar.gz 2>/dev/null || echo "Warning: GPG signing failed, continuing unsigned"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: |
            krabbystrap_*.deb*
            krabbystrap-*.tar.gz*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: packages
          path: ./packages

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: packages/**
          body: |
            ## Installation

            ### Debian / Ubuntu
            ```bash
            curl -fsSL https://raw.githubusercontent.com/krabbyorg/krabbystrap/main/packaging/setup-repo.sh | bash
            sudo apt install krabbystrap
            ```

            ### Arch Linux
            ```bash
            curl -fsSL https://raw.githubusercontent.com/krabbyorg/krabbystrap/main/packaging/setup-repo.sh | bash
            sudo pacman -S krabbystrap
            ```

            ### Manual Install
            Download the appropriate package above and install:
            - **Debian/Ubuntu**: `sudo apt install ./krabbystrap_*.deb`
            - **Arch Linux**: `sudo pacman -U ./krabbystrap-*.tar.gz`
