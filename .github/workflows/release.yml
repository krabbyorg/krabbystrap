name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup environment
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev build-essential python3-all tar
          sudo gem install fpm
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build .deb package
        run: |
          mkdir -p pkg/usr/lib/krabbystrap
          mkdir -p pkg/usr/bin
          mkdir -p pkg/usr/share/applications
          mkdir -p pkg/usr/share/pixmaps

          cp -r src templates assets requirements.txt pkg/usr/lib/krabbystrap/
          cp packaging/krabbystrap-launcher.sh pkg/usr/bin/krabbystrap
          chmod +x pkg/usr/bin/krabbystrap
          cp assets/krabby.png pkg/usr/share/pixmaps/krabbystrap.png

          printf '[Desktop Entry]\nName=Krabbystrap\nComment=Roblox launcher for Linux via Sober\nExec=krabbystrap\nIcon=krabbystrap\nType=Application\nCategories=Game;\nTerminal=false\nStartupWMClass=Krabbystrap\nActions=Settings;\n\n[Desktop Action Settings]\nName=Open Settings\nExec=krabbystrap --settings\n' \
            > pkg/usr/share/applications/krabbystrap.desktop

          fpm -s dir -t deb \
            -n krabbystrap \
            -v "$VERSION" \
            --description "Roblox launcher for Linux via Sober" \
            --url "https://github.com/krabbyorg/krabbystrap" \
            --license "GPL-3.0" \
            --depends "python3 (>= 3.11)" \
            --depends "python3-venv" \
            --depends "flatpak" \
            -C pkg .

      - name: Build AUR tarball
        run: |
          mkdir -p aur/krabbystrap-$VERSION
          cp -r src templates assets requirements.txt packaging aur/krabbystrap-$VERSION/
          cp packaging/PKGBUILD aur/krabbystrap-$VERSION/
          sed -i "s/^pkgver=.*/pkgver=$VERSION/" aur/krabbystrap-$VERSION/PKGBUILD
          tar czf krabbystrap-$VERSION-aur.tar.gz -C aur krabbystrap-$VERSION/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            krabbystrap_*.deb
            krabbystrap-*-aur.tar.gz
          body: |
            ## Installation

            ### Arch Linux (AUR)
            ```bash
            yay -S krabbystrap
            ```
            Or manually:
            ```bash
            git clone https://github.com/krabbyorg/krabbystrap && cd krabbystrap && ./install.sh
            ```

            ### Debian / Ubuntu
            ```bash
            sudo apt install ./krabbystrap_${{ env.VERSION }}_all.deb
            ```

            ### Manual (all distros)
            ```bash
            git clone https://github.com/krabbyorg/krabbystrap && cd krabbystrap && ./install.sh
            ```
